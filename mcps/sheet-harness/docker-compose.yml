version: "3.8"

services:
  taia-sheet-harness:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taia-sheet-harness
    restart: unless-stopped
    ports:
      - "8006:8006"  # MCP server
    volumes:
      - taia-workbooks:/workbooks
    environment:
      WORKBOOKS_DIR: "/workbooks"
      PORT_MCP: "8006"
      SHEET_HARNESS_HOST: "localhost"
      LOCK_TIMEOUT_SECONDS: "10"
      MAX_WORKBOOKS: "100"
    networks:
      - taia-net

volumes:
  taia-workbooks:

networks:
  taia-net:
    driver: bridge
